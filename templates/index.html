<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Simple To-Do List Test</title>
</head>
<body>
    <h1>To-Do List</h1>

    <ul>
    {% for task in tasks %}
        <li>
            {% if 'Completed' not in task %}
                <form action="/complete" method="POST" style="display:inline;">
                    <input
                        type="checkbox"
                        id="{{ loop.index }}"
                        name="taskCheckbox"
                        value="{{ loop.index }}"
                        onchange="this.form.submit()">
                </form>
            {% endif %}

            <label for="{{ loop.index }}">{{ task }}</label>

            {% if 'Completed' in task %}
                <button type="button" onclick="deleteTask({{ loop.index }})">
                    Delete
                </button>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
    

    <form method="POST" action="{{ url_for('add_task') }}">
        <label for="newTask">Add Task:</label>
        <input type="text" id="newTask" name="newTask" required>
        <button type="submit">Add</button>
    </form>
    
    <script>
        function deleteTask(index) {
            let form = document.createElement("form");
            form.method = "POST";
            form.action = "/delete";

            let input = document.createElement("input");
            input.type = "hidden";
            input.name = "taskCheckbox";
            input.value = index;

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
